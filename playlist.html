<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sugestões de Músicas | Casamento Rodrigo e Renata</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css?v=1.1">
</head>

<body>
    <div class="ambient-glow"></div>

    <header>
        <div class="glass-header">
            <h1 style="font-size: 1.3rem;">Sugestão de Música</h1>
            <p style="font-size: 0.65em; margin-bottom: 5px; text-transform: uppercase;">Sugira quantas músicas quiser!
            </p>
            <p style="font-size: 0.50em; color: #555555; text-transform: none; letter-spacing: normal;">Pode enviar
                várias vezes — Quanto mais músicas, melhor fica a festa.</p>
        </div>
    </header>

    <main class="container">
        <!-- Form for playlist -->
        <div class="playlist-form">
            <div class="form-group">
                <label for="guestName">Nome</label>
                <input type="text" id="guestName" placeholder="Informe seu nome" required>
                <div id="nameAlert" style="display: none; color: #ff4444; font-size: 0.85rem; margin-top: 5px;">Por
                    favor, preencha o seu nome.</div>
            </div>
            <div class="form-group">
                <label for="songSuggestion">Sugestão de Música</label>
                <input type="text" id="songSuggestion" placeholder="Nome da música e artista" required>
                <div id="songAlert" style="display: none; color: #ff4444; font-size: 0.85rem; margin-top: 5px;">Por
                    favor, informe uma sugestão de música.</div>
            </div>
            <button class="playlist-btn" onclick="addSong()">Adicionar Música</button>
            <div id="successMessage"
                style="display: none; color: #4caf50; font-size: 0.9rem; margin-top: 15px; text-align: center; font-weight: 500;">
                Música enviada com sucesso!</div>
        </div>

    </main>

    <script>
        async function addSong() {
            const nameInput = document.getElementById('guestName').value.trim();
            const songInput = document.getElementById('songSuggestion').value.trim();
            const nameAlert = document.getElementById('nameAlert');
            const songAlert = document.getElementById('songAlert');
            const successMessage = document.getElementById('successMessage');

            // Reset messages
            nameAlert.style.display = 'none';
            songAlert.style.display = 'none';
            successMessage.style.display = 'none';

            let hasError = false;

            if (!nameInput) {
                nameAlert.style.display = 'block';
                hasError = true;
            }

            if (!songInput) {
                songAlert.style.display = 'block';
                hasError = true;
            }

            if (hasError) {
                return;
            }

            const button = document.querySelector('.playlist-btn');
            const originalText = button.textContent;
            button.textContent = 'Enviando...';
            button.disabled = true;

            const dateTime = new Date().toLocaleString('pt-BR', {
                timeZone: 'America/Sao_Paulo',
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });

            try {
                const response = await fetch('https://n8n.progridai.com.br/webhook/playlist', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "name": nameInput,
                        "music": songInput,
                        "date-time": dateTime
                    })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                // Clear inputs
                document.getElementById('songSuggestion').value = '';

                // Show success message
                successMessage.style.display = 'block';
                setTimeout(() => {
                    successMessage.style.display = 'none';
                }, 3000);
            } catch (error) {
                console.error('Error sending music suggestion:', error);
                alert('Ocorreu um erro ao enviar a sugestão. Por favor, tente novamente.');
            } finally {
                button.textContent = originalText;
                button.disabled = false;
            }
        }
    </script>
</body>

</html>
